<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#000000"/>

  <g transform="translate(256,256) scale(1.25) translate(-256,-256)">
  <!-- Globe circle -->
  <circle cx="256" cy="256" r="120"
          fill="none"
          stroke="#00ff9f"
          stroke-width="8"
          filter="url(#glow)"
          opacity="0.7"/>

  <!-- Globe meridian lines -->
  <ellipse cx="256" cy="256" rx="50" ry="120"
           fill="none"
           stroke="#00ff9f"
           stroke-width="4"
           opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="90" ry="120"
           fill="none"
           stroke="#00ff9f"
           stroke-width="3"
           opacity="0.3"/>

  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="216" rx="110" ry="20"
           fill="none"
           stroke="#00ff9f"
           stroke-width="3"
           opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="120" ry="22"
           fill="none"
           stroke="#00ff9f"
           stroke-width="4"
           opacity="0.4"/>
  <ellipse cx="256" cy="296" rx="110" ry="20"
           fill="none"
           stroke="#00ff9f"
           stroke-width="3"
           opacity="0.3"/>

  <!-- Location pin -->
  <path d="M 256 206 C 230 206 210 226 210 251 C 210 286 256 336 256 336 C 256 336 302 286 302 251 C 302 226 282 206 256 206 Z"
        fill="#00ff9f33"
        stroke="#00ff9f"
        stroke-width="7"
        filter="url(#glow)"
        opacity="0.9"/>

  <!-- Pin dot -->
  <circle cx="256" cy="249" r="18"
          fill="#00ff9f"
          filter="url(#glow)"
          opacity="1"/>
  <circle cx="256" cy="249" r="9"
          fill="#000000"
          opacity="0.8"/>
  </g>

  <!-- Corner brackets (HUD style) -->
  <path d="M 80 120 L 80 80 L 120 80"
        fill="none" stroke="#00ff9f" stroke-width="6" opacity="0.5"/>
  <path d="M 392 80 L 432 80 L 432 120"
        fill="none" stroke="#00ff9f" stroke-width="6" opacity="0.5"/>
  <path d="M 432 392 L 432 432 L 392 432"
        fill="none" stroke="#00ff9f" stroke-width="6" opacity="0.5"/>
  <path d="M 120 432 L 80 432 L 80 392"
        fill="none" stroke="#00ff9f" stroke-width="6" opacity="0.5"/>
</svg>
